name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - wip-*

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend format check
        run: pnpm --dir frontend run format:check

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend tests
        run: pnpm --dir frontend run test

      - name: Frontend build
        run: pnpm --dir frontend run build

  desktop-linux:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mateoltd/axial-linux-ci:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Trust checkout as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend build
        run: pnpm --dir frontend run build

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust check
        run: cargo check --workspace --locked

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Release desktop build
        run: cargo build --locked -p axial-desktop --release
